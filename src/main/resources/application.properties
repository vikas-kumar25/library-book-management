spring.application.name=book-manager

# ==========================================
# 1. H2 Console Settings
# ==========================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# 2. Database Connection (JDBC) Settings
# ==========================================
spring.datasource.url=jdbc:h2:mem:bookdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ==========================================
# 3. Hibernate / JPA Settings
# ==========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.output.ansi.enabled=always 

# ==========================================
# 4. DEFAULT LOGGING LEVELS
# ==========================================
# Global fallback level (Defaults to INFO if not set)
logging.level.root=INFO

# CORRECTED: Set your actual package to DEBUG
logging.level.com.library.book_manager=DEBUG

# Silence noisy framework logs by raising their threshold
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG

# ==========================================
# 5. CONFIGURE OUTPUT FILES
# ==========================================
# Specify a relative or absolute file name
logging.file.name=logs/application.log

# ==========================================
# 6. CUSTOMIZE CONSOLE FORMAT
# ==========================================
# Standard readable layout containing date, time, and the log message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ==========================================
# 7. ACTUATORS
# ==========================================
# Expose all endpoints over HTTP (Great for development)
management.endpoints.web.exposure.include=*

# OR: Expose only specific endpoints (Best for production safety)
#management.endpoints.web.exposure.include=health,metrics,info

# Show full health details (components like db, diskSpace)
# Options: never, always, when_authorized
management.endpoint.health.show-details=always